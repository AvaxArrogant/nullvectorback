services:
  pulseshield:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulseshield:latest
    container_name: pulseshield
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      PULSESHIELD_DATA_DIR: "/data/pulseshield"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - pulseshield-data:/data/pulseshield
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pulseshield-data:
